<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 250" width="100%" height="100%">
  <defs>
    <!-- Background Gradient -->
    <linearGradient id="bgGradient" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#0b0c10"/>
      <stop offset="60%" stop-color="#0f111a"/>
      <stop offset="100%" stop-color="#1d111d"/>
    </linearGradient>

    <!-- Glowing Red/Orange Flare -->
    <radialGradient id="glow" cx="80%" cy="50%" r="55%">
      <stop offset="0%" stop-color="#f43f5e" stop-opacity="0.45"/>
      <stop offset="35%" stop-color="#ea580c" stop-opacity="0.2"/>
      <stop offset="100%" stop-color="#0f111a" stop-opacity="0"/>
    </radialGradient>

    <!-- Typography styling -->
    <style>
      @import url('https://fonts.googleapis.com/css2?family=Outfit:wght@400;600;800;900&amp;display=swap');
      .title-sub {
        font-family: 'Outfit', sans-serif;
        font-size: 13px;
        font-weight: 800;
        fill: #f43f5e;
        letter-spacing: 3px;
      }
      .title-main {
        font-family: 'Outfit', sans-serif;
        font-size: 42px;
        font-weight: 900;
        fill: #ffffff;
        letter-spacing: 1.5px;
      }
      .title-desc {
        font-family: 'Outfit', sans-serif;
        font-size: 16px;
        font-weight: 700;
        fill: #cbd5e1;
        letter-spacing: 2px;
      }
      .title-loc {
        font-family: 'Outfit', sans-serif;
        font-size: 12px;
        font-weight: 600;
        fill: #94a3b8;
        letter-spacing: 0.5px;
      }
    </style>
  </defs>

  <!-- Background Base -->
  <rect width="800" height="250" rx="20" fill="url(#bgGradient)"/>
  
  <!-- Glowing Overlay -->
  <rect width="800" height="250" rx="20" fill="url(#glow)"/>

  <!-- Sleek Border -->
  <rect width="798" height="248" x="1" y="1" rx="19" fill="none" stroke="#2e3047" stroke-width="2" stroke-opacity="0.7"/>

  <!-- Left Side Text Content (Customizable) -->
  <g transform="translate(50, 0)">
    <!-- Sub-heading / Domain -->
    <text x="0" y="75" class="title-sub">AI &amp; DATA SCIENCE STUDENT</text>
    
    <!-- Main Name -->
    <text x="0" y="125" class="title-main">AARYA SAARYAS</text>
    
    <!-- Secondary Title -->
    <text x="0" y="170" class="title-desc">FREELANCE DESIGNER &amp; EDITOR</text>
    
    <!-- Location Pin and Text -->
    <g transform="translate(0, 190)">
      <!-- Location Icon SVG Pin -->
      <path d="M5 0C2.24 0 0 2.24 0 5C0 8.75 5 14 5 14C5 14 10 8.75 10 5C10 2.24 7.76 0 5 0ZM5 6.8C4.01 6.8 3.2 5.99 3.2 5C3.2 4.01 4.01 3.2 5 3.2C5.99 3.2 6.8 4.01 6.8 5C6.8 5.99 5.99 6.8 5 6.8Z" fill="#f43f5e" transform="scale(0.9) translate(0, 2)"/>
      <text x="14" y="14" class="title-loc">Coimbatore, India</text>
    </g>
  </g>

  <!-- Right Side Vector Illustration: Typing Cat -->
  <g id="illustration" transform="translate(60, 0)">
    <!-- Tail -->
    <path d="M 655 140 Q 690 105 675 85" fill="none" stroke="#e8853b" stroke-width="12" stroke-linecap="round"/>
    <path d="M 655 140 Q 690 105 675 85" fill="none" stroke="#b45309" stroke-width="12" stroke-linecap="round" stroke-dasharray="8 12" stroke-dashoffset="2"/>

    <!-- Back feet -->
    <circle cx="650" cy="158" r="8" fill="#e8853b" stroke="#451a03" stroke-width="2.5"/>
    <circle cx="635" cy="160" r="8" fill="#e8853b" stroke="#451a03" stroke-width="2.5"/>

    <!-- Cat Body -->
    <rect x="560" y="120" width="100" height="46" rx="23" fill="#e8853b" stroke="#451a03" stroke-width="2.5"/>
    
    <!-- Body stripes -->
    <path d="M 590 120 C 590 128, 595 128, 595 120" fill="none" stroke="#b45309" stroke-width="3.5" stroke-linecap="round"/>
    <path d="M 610 120 C 610 128, 615 128, 615 120" fill="none" stroke="#b45309" stroke-width="3.5" stroke-linecap="round"/>
    <path d="M 630 120 C 630 128, 635 128, 635 120" fill="none" stroke="#b45309" stroke-width="3.5" stroke-linecap="round"/>

    <!-- Cat Paws Typing (reaching to laptop) -->
    <rect x="525" y="148" width="26" height="12" rx="6" fill="#e8853b" stroke="#451a03" stroke-width="2.5"/>
    <rect x="535" y="154" width="26" height="12" rx="6" fill="#e8853b" stroke="#451a03" stroke-width="2.5"/>

    <!-- Cat Head -->
    <ellipse cx="560" cy="125" rx="28" ry="24" fill="#e8853b" stroke="#451a03" stroke-width="2.5"/>

    <!-- Ears -->
    <polygon points="538,110 545,90 557,105" fill="#e8853b" stroke="#451a03" stroke-width="2.5" stroke-linejoin="round"/>
    <polygon points="563,105 575,90 582,110" fill="#e8853b" stroke="#451a03" stroke-width="2.5" stroke-linejoin="round"/>
    <!-- Inner Ears -->
    <polygon points="542,108 546,96 553,105" fill="#fda4af"/>
    <polygon points="567,105 573,96 578,108" fill="#fda4af"/>

    <!-- Sleeping Eyes -->
    <path d="M 545 127 Q 550 131 554 127" fill="none" stroke="#451a03" stroke-width="2.5" stroke-linecap="round"/>
    <path d="M 564 127 Q 569 131 573 127" fill="none" stroke="#451a03" stroke-width="2.5" stroke-linecap="round"/>

    <!-- Nose and Mouth -->
    <polygon points="558,131 561,131 559.5,133" fill="#e11d48"/>
    <path d="M 556 135 Q 559.5 138 563 135" fill="none" stroke="#451a03" stroke-width="2" stroke-linecap="round"/>

    <!-- Pink Cheeks -->
    <circle cx="541" cy="133" r="3.5" fill="#f43f5e" opacity="0.6"/>
    <circle cx="578" cy="133" r="3.5" fill="#f43f5e" opacity="0.6"/>

    <!-- Laptop (Keyboard Base) -->
    <polygon points="485,166 532,166 524,156 495,156" fill="#94a3b8" stroke="#451a03" stroke-width="2.5" stroke-linejoin="round"/>
    
    <!-- Laptop Screen -->
    <polygon points="495,156 524,156 518,127 489,127" fill="#64748b" stroke="#451a03" stroke-width="2.5" stroke-linejoin="round"/>
    <!-- Screen glow active area -->
    <polygon points="498,153 521,153 516,130 492,130" fill="#38bdf8" opacity="0.75"/>
    
    <!-- Light Reflection Glow (casting on cat's face) -->
    <polygon points="498,153 521,153 550,118 520,118" fill="#38bdf8" opacity="0.12"/>

    <!-- Coffee Mug on the side -->
    <rect x="470" y="152" width="11" height="13" rx="2.5" fill="#ef4444" stroke="#451a03" stroke-width="2"/>
    <path d="M 470 155 Q 466 158.5 470 162" fill="none" stroke="#451a03" stroke-width="2" stroke-linecap="round"/>
    <ellipse cx="475.5" cy="152" rx="5.5" ry="1.5" fill="#451a03"/>

    <!-- Speech Bubble "I'm ok!" -->
    <g transform="translate(605, 52)">
      <!-- Bubble tail -->
      <polygon points="15,29 5,39 23,29" fill="#ffffff" stroke="#451a03" stroke-width="2.5" stroke-linejoin="round"/>
      <!-- Bubble bubble body -->
      <rect width="66" height="30" rx="10" fill="#ffffff" stroke="#451a03" stroke-width="2.5"/>
      <!-- Masking lines -->
      <polygon points="14,28 6,37 22,28" fill="#ffffff"/>
      <rect x="2" y="2" width="62" height="26" rx="8" fill="#ffffff"/>
      <!-- Speech text -->
      <text x="33" y="19" font-family="'Outfit', sans-serif" font-weight="900" font-size="11px" fill="#451a03" text-anchor="middle">I'm ok!</text>
    </g>
  </g>
</svg>
